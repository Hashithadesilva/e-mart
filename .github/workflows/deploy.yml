name: 🚀 Deploy to Fly.io

on:
  push:
    branches: [main]          # Auto-deploy on push to main
  pull_request:
    branches: [main]          # Run checks on PRs, but don't deploy

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Run tests & code checks
  # ─────────────────────────────────────────────────────────
  test:
    name: ✅ Test & Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: emart_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, zip, gd, bcmath, xml, pcntl, exif
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 📦 Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: 🔧 Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: 🎨 Install NPM dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: ⚙️ Create .env for testing
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: emart_test
          DB_USERNAME: root
          DB_PASSWORD: secret

      - name: 🗄️ Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: emart_test
          DB_USERNAME: root
          DB_PASSWORD: secret

      - name: 🧪 Run PHPUnit tests
        run: php artisan test --parallel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: emart_test
          DB_USERNAME: root
          DB_PASSWORD: secret

  # ─────────────────────────────────────────────────────────
  # JOB 2: Deploy to Fly.io (only on push to main)
  # ─────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test                        # Only deploy if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛫 Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: 🚀 Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
